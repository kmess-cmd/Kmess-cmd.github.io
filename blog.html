  <script>
    const POSTS = [
      {
        id: 'from-myspace-to-kylemesser-com',
        title: 'From MySpace to kylemesser.com — What Profile Customization Taught Me About Web Development',
        category: 'career',
        date: 'March 2026',
        readTime: '8 min read',
        excerpt: 'How customizing MySpace profiles in 2006 taught me fundamental web development and security concepts that I still use today as a cybersecurity professional.',
        content: `
          <p>When I tell people that my web development journey started with customizing MySpace profiles in 2006, I usually get a knowing smile from fellow millennials and confused looks from Gen Z. But here's the thing — those hours spent tweaking CSS to make my profile stand out from the default layouts taught me fundamental concepts that I still use today as a cybersecurity professional building tools and maintaining my own website.</p>
          <p>Recently, while working on updates to kylemesser.com, I found myself reflecting on how that early exposure to HTML and CSS shaped my approach to both development and security. The principles I learned customizing social media profiles — understanding code structure, recognizing patterns, and thinking about user experience — directly translate to the work I do today in cybersecurity.</p>
          <h2>The MySpace Era: Learning by Breaking Things</h2>
          <p>Back in 2006, MySpace was the king of social media, and profile customization was everything. Unlike today's locked-down platforms, MySpace gave users an "About Me" section where you could inject raw HTML and CSS. This was both powerful and dangerous — exactly the kind of environment where you learn fast.</p>
          <p>I spent countless hours copying and modifying code snippets, tweaking backgrounds, fonts, colors, and profile formatting until everything looked exactly right. Most of the time, I had no idea what I was actually doing — but that was the point. Breaking things and fixing them is how you actually learn.</p>
          <p>What I was really building, without realizing it, was an intuitive understanding of how web technologies work together. The autoplay song that blasted the second anyone opened your page? That was embedded media. The custom background and font colors? CSS. The layout shifting when something went wrong? The DOM teaching me a lesson.</p>
          <h2>Pattern Recognition and Problem Solving</h2>
          <p>What I didn't realize at the time was that I was developing critical thinking skills that would prove invaluable in cybersecurity. When a layout didn't work as expected, I had to debug systematically, recognize patterns, research solutions, and test thoroughly. These same skills are essential when analyzing Nessus scan results or investigating security incidents.</p>
          <h2>Understanding the Security Implications</h2>
          <p>The security professional in me now looks back at MySpace's approach with a different perspective. Allowing users to inject arbitrary HTML and CSS was a recipe for disaster — the platform was a real-world XSS playground. Experiencing that environment firsthand gave me early, intuitive insight into why input validation matters. I didn't know what cross-site scripting was at 13. But I saw it happening.</p>
          <h2>Building kylemesser.com: Applying Those Lessons</h2>
          <p>Fast forward to today, and I'm maintaining my own professional portfolio site built from scratch — no templates, no WordPress, just HTML and CSS. The same stubborn curiosity that once made me spend hours tweaking profile layouts just to get them exactly right is what drove me to build every part of this site by hand.</p>
          <p>The syntax has evolved significantly since 2006, but the core principles remain the same: understanding how elements relate to each other, how styling cascades, and how to create something clean and functional that you're proud to put your name on.</p>
          <h2>Security-First Development Mindset</h2>
          <p>The biggest difference between my MySpace days and now is the security-first mindset I bring to every project. When building features for my site or creating tools like PassAudit, I'm constantly thinking about trust boundaries, input validation, and what happens when things go wrong. Those considerations were absent from my teenage web experiments — now they're non-negotiable.</p>
          <h2>Teaching the Next Generation</h2>
          <p>One of the most rewarding parts of this journey has been teaching my kids Python and Arduino programming. I try to give them the same hands-on, break-it-and-fix-it experimentation that made learning so engaging for me — but with security thinking built in from the start.</p>
          <h2>The Top 8</h2>
          <p>MySpace gave you eight slots for your closest friends. In the spirit of that — I'm leaving my Top 8 open. If you made it this far, checked out PassAudit, or found your way here from LinkedIn — you're a candidate. I'm actively seeking my next cybersecurity role and would love to connect.</p>
          <p>The site is live at <a href="https://kylemesser.com">kylemesser.com</a>. Come say hello.</p>
        `
      },
      {
        id: 'passaudit-writeup',
        title: 'Building PassAudit: A Password Strength Analyzer',
        category: 'tool',
        date: 'March 2026',
        readTime: '6 min read',
        excerpt: 'After years watching users recycle predictable passwords on government systems, I built a client-side password analyzer that shows exactly why "clever" passwords aren\'t. Here\'s how the math works.',
        content: `
<h2>The Reaction That Inspired This Tool</h2>
<p>When I show colleagues my password analyzer, the most common reaction is always the same. They confidently type in their "clever" password — P@ssw0rd123 or Summ3r2024! — expecting a green checkmark. Instead, they watch in disbelief as the tool flags it as weak and estimates it would crack in minutes.</p>
<p>Here's the hard truth: those deliberate substitutions don't fool anyone. Attackers have known about leet speak for decades, and every serious cracking wordlist includes these variations automatically. After years supporting Department of State contractors and watching users recycle predictable passwords on government systems, I decided to build a tool that shows people exactly why their "secure" passwords aren't.</p>
<h2>Why Client-Side Analysis Matters</h2>
<p>The biggest problem with most password checkers is trust. How can you verify the strength of your most sensitive passwords by sending them to someone else's server? You can't. That's why PassAudit runs entirely in your browser using vanilla HTML, CSS, and JavaScript — no frameworks, no backend, nothing ever leaves your device.</p>
<h2>The Analysis Engine: Beyond Simple Rules</h2>
<p>PassAudit evaluates passwords across multiple dimensions that matter in real-world attacks.</p>
<h3>Entropy Calculation: The Math That Matters</h3>
<p>Here's where the real security analysis happens:</p>
<pre><code>function calculateEntropy(password) {
  let poolSize = 0;
  if (/[a-z]/.test(password)) poolSize += 26;
  if (/[A-Z]/.test(password)) poolSize += 26;
  if (/[0-9]/.test(password)) poolSize += 10;
  if (/[^a-zA-Z0-9]/.test(password)) poolSize += 32;
  return password.length * Math.log2(poolSize);
}</code></pre>
<p>The formula is straightforward: length x log2(pool_size). A 12-character password using all four character sets gives roughly 78 bits of entropy. Anything above 128 bits is extremely strong.</p>
<h3>The Blacklist: Learning from Breaches</h3>
<p>I compiled over 50 known weak passwords from breach data. The patterns were depressingly predictable — seasonal passwords, keyboard walks, leet speak substitutions, and enterprise favorites like variations of "welcome" that dominated government new-account setups.</p>
<h2>Making Math Meaningful: Crack Time Estimates</h2>
<p>Raw entropy numbers don't resonate with most users, so PassAudit translates them into estimated crack times under two realistic scenarios: online attacks at 1,000 attempts per second, and offline GPU attacks at 10 billion attempts per second. That P@ssw0rd123 they thought was clever? Seconds to minutes offline.</p>
<h2>Privacy by Design: The HIBP Integration Plan</h2>
<p>The next major feature is integration with HaveIBeenPwned using k-anonymity. You hash your password with SHA-1, send only the first 5 characters of that hash, and receive back matching suffixes. Your actual password never leaves the browser — breach detection without the privacy tradeoff.</p>
<h2>What's Next</h2>
<ul>
  <li>HaveIBeenPwned integration using k-anonymity</li>
  <li>Passphrase generator for creating truly strong passwords</li>
  <li>Bulk analysis mode for security audits</li>
</ul>
<p>You can try PassAudit at <a href="/passaudit.html">kylemesser.com/passaudit.html</a> — and since it's fully client-side, you can view the source to see exactly how it works.</p>
        `
      }
    ];

    const TAG_CLASS = { tool: 'tag-tool', walkthrough: 'tag-walkthrough', study: 'tag-study', news: 'tag-news', career: 'tag-career' };
    const TAG_LABEL = { tool: 'Tool Writeup', walkthrough: 'Walkthrough', study: 'Study Notes', news: 'Industry News', career: 'Career' };

    let currentFilter = 'all';

    function renderPosts(filter) {
      const wrap = document.getElementById('postsWrap');
      const empty = document.getElementById('emptyState');
      const filtered = filter === 'all' ? POSTS : POSTS.filter(p => p.category === filter);
      if (filtered.length === 0) { wrap.innerHTML = ''; empty.classList.add('show'); return; }
      empty.classList.remove('show');
      wrap.innerHTML = filtered.map((post, i) => `
        <a class="post-card fade-in" onclick="openPost('${post.id}')" href="javascript:void(0)" style="animation-delay:${i*0.08}s">
          <div class="post-meta">
            <span class="post-tag ${TAG_CLASS[post.category]}">${TAG_LABEL[post.category]}</span>
            <span class="post-date">${post.date}</span>
            <span class="post-read">${post.readTime}</span>
          </div>
          <div class="post-title">${post.title}</div>
          <div class="post-excerpt">${post.excerpt}</div>
          <div class="post-footer"><span class="post-link">Read more →</span></div>
        </a>
      `).join('');
      setTimeout(() => { document.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible')); }, 50);
    }

    function filterPosts(cat) {
      currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      renderPosts(cat);
    }

    function openPost(id) {
      const post = POSTS.find(p => p.id === id);
      if (!post) return;
      document.getElementById('listView').style.display = 'none';
      const full = document.getElementById('postFull');
      full.classList.add('show');
      document.getElementById('postFullContent').innerHTML = `
        <div class="post-full-meta">
          <span class="post-tag ${TAG_CLASS[post.category]}">${TAG_LABEL[post.category]}</span>
          <span class="post-date">${post.date}</span>
          <span class="post-read">${post.readTime}</span>
        </div>
        <h1 class="post-full-title">${post.title}</h1>
        <div class="post-full-body">${post.content}</div>
      `;
      window.scrollTo(0, 0);
    }

    function backToList() {
      document.getElementById('listView').style.display = 'block';
      document.getElementById('postFull').classList.remove('show');
      window.scrollTo(0, 0);
    }

    renderPosts('all');

    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.08 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>
</body>
