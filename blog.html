<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog — Kyle Messer | Cybersecurity</title>
  <meta name="description" content="Cybersecurity insights, tool writeups, TryHackMe walkthroughs, and career notes by Kyle Messer."/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0XGZPZLEQT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0XGZPZLEQT');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07090d; --bg2: #0b0f16; --bg3: #101520;
      --accent: #00e5ff; --accent2: #00ff9d;
      --text: #c9d1d9; --muted: #4a5568; --border: #1a2333;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --max: 900px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 300; line-height: 1.7; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 60px 60px; opacity: 0.15; pointer-events: none; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 3rem; background: rgba(7,9,13,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: var(--mono); color: var(--accent); font-size: 0.95rem; letter-spacing: 0.1em; text-decoration: none; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; transition: color 0.2s; font-family: var(--mono); }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    /* HEADER */
    .page-header { padding: 8rem 3rem 3rem; max-width: var(--max); margin: 0 auto; }
    .page-tag { font-family: var(--mono); font-size: 0.72rem; color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 0.75rem; }
    .page-title { font-family: var(--mono); font-size: clamp(2rem, 5vw, 3rem); color: #fff; font-weight: 400; margin-bottom: 0.75rem; }
    .page-title span { color: var(--accent); }
    .page-desc { font-size: 0.9rem; color: var(--muted); max-width: 500px; line-height: 1.7; }

    /* FILTER TABS */
    .filters { padding: 0 3rem 2rem; max-width: var(--max); margin: 0 auto; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filter-btn { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.35rem 0.85rem; border-radius: 2px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

    /* POSTS */
    .posts-wrap { padding: 0 3rem 6rem; max-width: var(--max); margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }

    .post-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 2rem; transition: border-color 0.2s, transform 0.2s; position: relative; overflow: hidden; cursor: pointer; text-decoration: none; display: block; color: inherit; }
    .post-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), transparent); transition: background 0.3s; }
    .post-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .post-card:hover::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }

    .post-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .post-tag { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: 2px; }
    .tag-tool     { background: rgba(0,229,255,0.1); color: var(--accent); border: 1px solid rgba(0,229,255,0.25); }
    .tag-walkthrough { background: rgba(0,255,157,0.1); color: var(--accent2); border: 1px solid rgba(0,255,157,0.25); }
    .tag-study    { background: rgba(255,209,102,0.1); color: #ffd166; border: 1px solid rgba(255,209,102,0.25); }
    .tag-news     { background: rgba(255,70,85,0.1); color: #ff4655; border: 1px solid rgba(255,70,85,0.25); }
    .tag-career   { background: rgba(180,100,255,0.1); color: #b464ff; border: 1px solid rgba(180,100,255,0.25); }

    .post-date { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); letter-spacing: 0.08em; }
    .post-read  { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); margin-left: auto; }

    .post-title { font-family: var(--mono); font-size: 1.1rem; color: #fff; margin-bottom: 0.6rem; line-height: 1.4; }
    .post-excerpt { font-size: 0.875rem; color: var(--text); line-height: 1.7; }
    .post-footer { margin-top: 1.25rem; display: flex; align-items: center; justify-content: space-between; }
    .post-link { font-family: var(--mono); font-size: 0.72rem; color: var(--accent); letter-spacing: 0.1em; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 4rem 2rem; font-family: var(--mono); color: var(--muted); font-size: 0.82rem; letter-spacing: 0.1em; display: none; }
    .empty-state.show { display: block; }

    /* FULL POST VIEW */
    .post-full { display: none; padding: 8rem 3rem 6rem; max-width: var(--max); margin: 0 auto; }
    .post-full.show { display: block; }
    .post-full-back { font-family: var(--mono); font-size: 0.72rem; color: var(--accent); background: none; border: none; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.5rem; padding: 0; transition: color 0.2s; }
    .post-full-back:hover { color: #fff; }
    .post-full-title { font-family: var(--mono); font-size: clamp(1.5rem, 4vw, 2.2rem); color: #fff; font-weight: 400; margin-bottom: 1rem; line-height: 1.3; }
    .post-full-meta { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .post-full-body { font-size: 0.95rem; line-height: 1.9; color: var(--text); }
    .post-full-body h2 { font-family: var(--mono); font-size: 1.1rem; color: var(--accent); margin: 2rem 0 0.75rem; font-weight: 400; }
    .post-full-body h3 { font-family: var(--mono); font-size: 0.95rem; color: #fff; margin: 1.5rem 0 0.5rem; font-weight: 400; }
    .post-full-body p { margin-bottom: 1.25rem; }
    .post-full-body ul, .post-full-body ol { margin: 0.75rem 0 1.25rem 1.5rem; }
    .post-full-body li { margin-bottom: 0.4rem; }
    .post-full-body code { font-family: var(--mono); background: var(--bg3); border: 1px solid var(--border); padding: 0.15rem 0.4rem; border-radius: 2px; font-size: 0.85em; color: var(--accent2); }
    .post-full-body pre { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 1.25rem; margin: 1rem 0; overflow-x: auto; }
    .post-full-body pre code { background: none; border: none; padding: 0; font-size: 0.85rem; color: var(--accent2); }
    .post-full-body blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; color: var(--muted); font-style: italic; margin: 1rem 0; }
    .post-full-body a { color: var(--accent); }
    .post-full-body strong { color: #fff; font-weight: 500; }

    /* FOOTER */
    footer { padding: 1.75rem 3rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    footer p { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }
    footer a { color: var(--accent); text-decoration: none; }

    .fade-in { opacity: 0; transform: translateY(14px); transition: opacity 0.55s ease, transform 0.55s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { gap: 1rem; }
      .nav-links a { font-size: 0.65rem; }
      .page-header, .filters, .posts-wrap, .post-full { padding-left: 1.5rem; padding-right: 1.5rem; }
      footer { flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">km://</a>
    <ul class="nav-links">
      <li><a href="/#about">About</a></li>
      <li><a href="/#experience">Experience</a></li>
      <li><a href="/#projects">Projects</a></li>
      <li><a href="/blog.html" class="active">Blog</a></li>
      <li><a href="/#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- BLOG LIST VIEW -->
  <div id="listView">
    <div class="page-header">
      <p class="page-tag">// field notes</p>
      <h1 class="page-title">Security <span>Blog</span></h1>
      <p class="page-desc">Writeups, walkthroughs, study notes, and thoughts on cybersecurity — by Kyle Messer.</p>
    </div>

    <div class="filters" id="filters">
      <button class="filter-btn active" onclick="filterPosts('all')">All</button>
      <button class="filter-btn" onclick="filterPosts('tool')">Tool Writeups</button>
      <button class="filter-btn" onclick="filterPosts('walkthrough')">Walkthroughs</button>
      <button class="filter-btn" onclick="filterPosts('study')">Study Notes</button>
      <button class="filter-btn" onclick="filterPosts('news')">Industry News</button>
      <button class="filter-btn" onclick="filterPosts('career')">Career</button>
    </div>

    <div class="posts-wrap" id="postsWrap"></div>
    <div class="empty-state" id="emptyState">// no posts in this category yet</div>
  </div>

  <!-- FULL POST VIEW -->
  <div class="post-full" id="postFull">
    <button class="post-full-back" onclick="backToList()">← Back to Blog</button>
    <div id="postFullContent"></div>
  </div>

  <footer>
    <p>© 2026 Kyle Messer · <a href="/">kylemesser.com</a></p>
    <p>Built by hand · <a href="https://pages.github.com" target="_blank">GitHub Pages</a></p>
  </footer>

  <script>
    // ─── POSTS DATA ──────────────────────────────────────────────────────────
    // To add a new post, copy a post object and fill in the fields.
    // category options: tool | walkthrough | study | news | career
    const POSTS = [
      {
        id: 'passaudit-writeup',
        title: 'Building PassAudit: A Password Strength Analyzer from Scratch',
        category: 'tool',
        date: 'March 2026',
        readTime: '5 min read',
        excerpt: 'How I built a browser-based password strength analyzer using vanilla JavaScript — covering entropy calculation, crack time estimation, common password blacklisting, and why no tool can guarantee 100% security.',
        content: `
<h2>Why I Built This</h2>
<p>Password security is one of the most fundamental concepts in cybersecurity — and one of the most misunderstood by everyday users. After years of working in security operations and watching people reuse weak passwords across systems, I wanted to build something that could visually explain <em>why</em> a password is weak or strong, not just tell you it is.</p>
<p>PassAudit is my first publicly released security tool. It runs entirely in the browser — no server, no data collection, no backend. Everything stays on your device.</p>

<h2>How It Works</h2>
<h3>Entropy Calculation</h3>
<p>The core of any password strength assessment is <strong>entropy</strong> — a measure of randomness or unpredictability. The formula is straightforward:</p>
<pre><code>Entropy (bits) = length × log₂(pool_size)</code></pre>
<p>Where <code>pool_size</code> is the number of possible characters based on what character sets are used:</p>
<ul>
  <li>Lowercase only: 26</li>
  <li>+ Uppercase: +26 (52 total)</li>
  <li>+ Numbers: +10 (62 total)</li>
  <li>+ Special characters: +32 (94 total)</li>
</ul>
<p>A password with 128+ bits of entropy is considered extremely strong against brute-force attacks.</p>

<h3>Crack Time Estimation</h3>
<p>Once we have entropy, we can estimate how long a brute-force attack would take:</p>
<pre><code>combinations = 2^entropy
seconds = combinations / 2 / attempts_per_second</code></pre>
<p>PassAudit calculates two scenarios:</p>
<ul>
  <li><strong>Online attack</strong> — 1,000 attempts/sec (typical rate-limited login)</li>
  <li><strong>Offline attack</strong> — 10 billion attempts/sec (GPU-accelerated hash cracking)</li>
</ul>

<h3>Common Password Blacklist</h3>
<p>Entropy alone doesn't tell the whole story. A password like <code>Password1!</code> scores reasonably well on complexity checks but appears on every known password list. PassAudit checks against a curated blacklist of the most commonly used passwords and immediately flags them regardless of their entropy score.</p>

<h3>Scoring</h3>
<p>The final score out of 100 is calculated from three components:</p>
<ul>
  <li><strong>Length (0–30 points)</strong> — longer passwords are exponentially harder to crack</li>
  <li><strong>Complexity (0–40 points)</strong> — 10 points each for uppercase, lowercase, numbers, and special characters</li>
  <li><strong>Entropy bonus (0–30 points)</strong> — rewards passwords that achieve high randomness</li>
</ul>

<h2>Key Lessons Learned</h2>
<p>Building this tool reinforced several things I already knew from my security operations work but hadn't thought about from a developer's perspective:</p>
<ul>
  <li>Password length matters more than complexity. A 20-character lowercase passphrase beats a 10-character "complex" password.</li>
  <li>Pattern-based passwords (like <code>P@ssw0rd!</code>) are well-known to attackers and crack faster than their entropy suggests.</li>
  <li>No client-side tool can detect if your password has been exposed in a data breach — for that, check <a href="https://haveibeenpwned.com" target="_blank">haveibeenpwned.com</a>.</li>
</ul>

<h2>What's Next</h2>
<p>Future improvements I'm considering:</p>
<ul>
  <li>HaveIBeenPwned API integration to check if a password has appeared in known breaches</li>
  <li>Passphrase generator with entropy display</li>
  <li>Side-by-side comparison mode</li>
</ul>
<p>You can try PassAudit at <a href="/passaudit.html">kylemesser.com/passaudit</a>. All analysis happens in your browser — nothing is ever transmitted.</p>
        `
      }
    ];

    // ─── RENDER ──────────────────────────────────────────────────────────────
    let currentFilter = 'all';

    const TAG_CLASS = {
      tool: 'tag-tool', walkthrough: 'tag-walkthrough',
      study: 'tag-study', news: 'tag-news', career: 'tag-career'
    };
    const TAG_LABEL = {
      tool: 'Tool Writeup', walkthrough: 'Walkthrough',
      study: 'Study Notes', news: 'Industry News', career: 'Career'
    };

    function renderPosts(filter) {
      const wrap = document.getElementById('postsWrap');
      const empty = document.getElementById('emptyState');
      const filtered = filter === 'all' ? POSTS : POSTS.filter(p => p.category === filter);

      if (filtered.length === 0) {
        wrap.innerHTML = '';
        empty.classList.add('show');
        return;
      }

      empty.classList.remove('show');
      wrap.innerHTML = filtered.map((post, i) => `
        <a class="post-card fade-in" onclick="openPost('${post.id}')" href="javascript:void(0)" style="animation-delay:${i*0.08}s">
          <div class="post-meta">
            <span class="post-tag ${TAG_CLASS[post.category]}">${TAG_LABEL[post.category]}</span>
            <span class="post-date">${post.date}</span>
            <span class="post-read">${post.readTime}</span>
          </div>
          <div class="post-title">${post.title}</div>
          <div class="post-excerpt">${post.excerpt}</div>
          <div class="post-footer">
            <span class="post-link">Read more →</span>
          </div>
        </a>
      `).join('');

      // Trigger animations
      setTimeout(() => {
        document.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible'));
      }, 50);
    }

    function filterPosts(cat) {
      currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      renderPosts(cat);
    }

    function openPost(id) {
      const post = POSTS.find(p => p.id === id);
      if (!post) return;

      document.getElementById('listView').style.display = 'none';
      const full = document.getElementById('postFull');
      full.classList.add('show');

      document.getElementById('postFullContent').innerHTML = `
        <div class="post-full-meta">
          <span class="post-tag ${TAG_CLASS[post.category]}">${TAG_LABEL[post.category]}</span>
          <span class="post-date">${post.date}</span>
          <span class="post-read">${post.readTime}</span>
        </div>
        <h1 class="post-full-title">${post.title}</h1>
        <div class="post-full-body">${post.content}</div>
      `;

      window.scrollTo(0, 0);
    }

    function backToList() {
      document.getElementById('listView').style.display = 'block';
      document.getElementById('postFull').classList.remove('show');
      window.scrollTo(0, 0);
    }

    // Init
    renderPosts('all');

    // Intersection observer
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.08 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>
</body>
</html>
